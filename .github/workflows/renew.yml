name: Auto Renew Katabump

on:  
  schedule:
    - cron: '22 1 * * *'  # 每天运行一次（UTC时间 03:17）
  workflow_dispatch:  # 允许手动触发

jobs:
  auto_renew_katabump:
    runs-on: ubuntu-22.04

    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y xvfb
          
      - name: 🔄 Replace system Chrome with version 146
        run: |
          echo "🔍 清理旧版本..."
          sudo rm -rf /opt/google/chrome /usr/bin/google-chrome 2>/dev/null || true
          echo "📦 下载 Chrome 146 for Testing..."
          CHROME_VERSION="146.0.7680.165"
          wget -q "https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}/linux64/chrome-linux64.zip" -O /tmp/chrome146.zip
          echo "📦 解压..."
          sudo mkdir -p /opt/google/chrome
          sudo unzip -q /tmp/chrome146.zip -d /tmp/chrome-extract
          echo "📦 安装到系统路径..."
          sudo mv /tmp/chrome-extract/chrome-linux64/* /opt/google/chrome/
          echo "🔗 创建系统命令链接..."
          sudo ln -sf /opt/google/chrome/chrome /usr/bin/google-chrome
          sudo chmod +x /opt/google/chrome/chrome
          echo "🧹 清理临时文件（使用 sudo）..."
          # 🔹 修复：清理也用 sudo + 修正参数顺序
          sudo rm -rf /tmp/chrome-extract
          sudo rm -f /tmp/chrome146.zip
          echo "✅ 验证安装..."
          google-chrome --version
          echo "CHROME_VERSION=146" >> $GITHUB_ENV

      - name: Start X Virtual Frame Buffer (Xvfb)
        # 在后台启动 Xvfb，创建一个虚拟屏幕 :99
        run: Xvfb :99 -ac &
        
      - name: Launch sing-box if VLINK set
        env:
          VLINK: ${{ secrets.VLINK }}
        if: ${{ env.VLINK != '' }}
        run: |
            curl -LO https://amd64.ssss.nyc.mn/sb
            curl -LO https://raw.githubusercontent.com/liveqte/jupyter-notebook-deployed/refs/heads/main/vlink_to_sb.py
            chmod +x sb
            python vlink_to_sb.py $VLINK > v.json
            nohup ./sb run -c v.json > /dev/null 2>&1 &
            sleep 3
            echo "HTTP_PROXY=socks5://127.0.0.1:1080" >> $GITHUB_ENV
            
      - name: Run Script in Stealth Mode (via Xvfb)
        env:
          DISPLAY: ':99'
          HEADLESS: 'false'
        run: |
          python renew_katabump.py
